{{ define "main" }}
  <article class="list-page">
    <div class="container">
      <div class="page-header">
        <h1>{{ .Title }}</h1>
        {{ with .Description }}
          <p class="page-desc">{{ . }}</p>
        {{ end }}
      </div>
      <div class="page-content prose">
        {{ .Content }}
      </div>
    </div>
  </article>
{{ end }}
