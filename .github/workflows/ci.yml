name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  R_VERSION: "4.5.3"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RENV_CONFIG_SYNCHRONIZED_CHECK: false

jobs:
  checks:
    name: R checks and Hugo build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libfribidi-dev \
            libgit2-dev \
            libglpk-dev \
            libharfbuzz-dev \
            libjpeg-dev \
            libpng-dev \
            libpq-dev \
            libssl-dev \
            libtiff-dev \
            libxml2-dev

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}
          use-public-rspm: true

      - name: Restore renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Check R project
        run: Rscript R/ci/check_project.R

      - name: Lint R scripts
        continue-on-error: true
        run: Rscript R/ci/lint.R

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Build Hugo site
        run: hugo --source docs-site --destination public --minify
