name: ETL Export

on:
  workflow_dispatch:
    inputs:
      data_index_url:
        description: Optional local/remote data index override for DATA_INDEX_URL.
        required: false
        type: string
      publish_downloads:
        description: Publish descargas/ to Cloudflare R2 after validation.
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "0 5 * * 0"
  push:
    branches: [main]
    paths:
      - "_targets.R"
      - "run.R"
      - "R/**"
      - "docs-site/data_index.csv"
      - "docs-site/data/diagnosticos/**"
      - "renv.lock"

permissions:
  contents: read

concurrency:
  group: etl-export-${{ github.ref }}
  cancel-in-progress: false

env:
  R_VERSION: "4.5.3"
  DATA_INDEX_URL: ${{ inputs.data_index_url }}

jobs:
  export:
    name: Run ETL export
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libfribidi-dev \
            libgit2-dev \
            libharfbuzz-dev \
            libjpeg-dev \
            libpng-dev \
            libpq-dev \
            libssl-dev \
            libtiff-dev \
            libxml2-dev \
            unzip

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}
          use-public-rspm: true

      - name: Restore renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Restore targets cache
        uses: actions/cache@v4
        with:
          path: _targets
          key: targets-${{ runner.os }}-${{ hashFiles('renv.lock', '_targets.R', 'run.R', 'R/**/*.R', 'docs-site/data_index.csv') }}
          restore-keys: |
            targets-${{ runner.os }}-

      - name: Download data-raw
        run: Rscript -e "source('R/00-setup/download_data_raw.R')"

      - name: Run export pipeline
        run: Rscript -e "source('run.R'); run_export(); run_export_calidad()"

      - name: Validate export artifacts
        run: Rscript R/ci/check_exports.R

      - name: Write ETL summary
        run: Rscript R/ci/write_summary.R

      - name: Upload downloads artifact
        uses: actions/upload-artifact@v4
        with:
          name: eleccionesdb-descargas
          path: descargas/*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: eleccionesdb-etl-summary
          path: ci-summary.md
          if-no-files-found: error
          retention-days: 14

      - name: Configure Cloudflare R2 credentials
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_downloads }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CF_S3_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.CF_S3_SECRET_KEY }}
          aws-region: us-east-1

      - name: Publish downloads to Cloudflare R2
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_downloads }}
        env:
          CF_S3_BUCKET: ${{ secrets.CF_S3_BUCKET }}
          CF_S3_ENDPOINT: ${{ secrets.CF_S3_ENDPOINT }}
          CF_S3_PUBLIC_BASE_URL: ${{ secrets.CF_S3_PUBLIC_BASE_URL }}
        run: |
          aws s3 sync descargas "s3://${CF_S3_BUCKET}/eleccionesdb-etl/descargas/" \
            --endpoint-url "${CF_S3_ENDPOINT}" \
            --delete
          echo "Published: ${CF_S3_PUBLIC_BASE_URL}/eleccionesdb-etl/descargas/" >> "${GITHUB_STEP_SUMMARY}"
