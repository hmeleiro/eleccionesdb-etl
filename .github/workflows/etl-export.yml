name: ETL Export

on:
  workflow_dispatch:
    inputs:
      data_index_url:
        description: Optional local/remote data manifest override for DATA_INDEX_URL.
        required: false
        type: string
      smoke_test:
        description: Run a faster smoke ETL with data-manifest-smoke.csv and a small hechos subset.
        required: true
        default: false
        type: boolean
      publish_downloads:
        description: Publish descargas/ to Cloudflare R2 after validation.
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "0 5 * * 0"
  push:
    branches: [main]
    paths:
      - "_targets.R"
      - "run.R"
      - "R/**"
      - "data-manifest.csv"
      - "data-manifest-smoke.csv"
      - "renv.lock"
      - "install_deps.R"
      - ".github/workflows/etl-export.yml"

permissions:
  contents: read

concurrency:
  group: etl-export-${{ github.ref }}
  cancel-in-progress: false

env:
  R_VERSION: "4.5.3"
  RENV_CONFIG_SYNCHRONIZED_CHECK: false
  TARGETS_ERROR: stop
  ETL_SMOKE: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_test && 'true' || 'false' }}
  DATA_INDEX_URL: ${{ inputs.data_index_url || (github.event_name == 'workflow_dispatch' && inputs.smoke_test && 'data-manifest-smoke.csv' || '') }}
  ETL_HECHOS_REGIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_test && 'la_rioja,congreso,aragon' || '' }}

jobs:
  export:
    name: Run ETL export
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libfribidi-dev \
            libgit2-dev \
            libglpk-dev \
            libharfbuzz-dev \
            libjpeg-dev \
            libpng-dev \
            libpq-dev \
            libssl-dev \
            libtiff-dev \
            libxml2-dev \
            unzip \
            chromium \
            cmake \
            libx11-dev \
            pandoc

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}
          use-public-rspm: true

      - name: Restore renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Restore targets cache
        if: ${{ env.DATA_INDEX_URL == '' && env.ETL_HECHOS_REGIONS == '' }}
        uses: actions/cache@v5
        with:
          path: _targets
          key: targets-${{ runner.os }}-${{ hashFiles('renv.lock', '_targets.R', 'run.R', 'R/**/*.R', 'data-manifest.csv') }}
          restore-keys: |
            targets-${{ runner.os }}-

      - name: Restore data-raw cache
        id: cache-data
        if: ${{ env.DATA_INDEX_URL == '' }}
        uses: actions/cache@v5
        with:
          path: data-raw
          key: data-raw-${{ runner.os }}-${{ hashFiles('data-manifest.csv') }}

      - name: Download data-raw
        if: ${{ env.DATA_INDEX_URL != '' || steps.cache-data.outputs.cache-hit != 'true' }}
        run: Rscript -e "source('R/00-setup/download_data_raw.R')"

      - name: Check data-raw
        run: Rscript R/00-setup/check_data_raw.R

      - name: Run export pipeline
        run: Rscript -e "source('run.R'); run_export_pipeline_ordered()"

      - name: Validate export artifacts
        run: Rscript R/ci/check_exports.R

      - name: Write ETL summary
        run: Rscript R/ci/write_summary.R

      - name: Upload downloads artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ETL_SMOKE == 'true' && 'eleccionesdb-descargas-smoke' || 'eleccionesdb-descargas' }}
          path: descargas/*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload summary artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ETL_SMOKE == 'true' && 'eleccionesdb-etl-summary-smoke' || 'eleccionesdb-etl-summary' }}
          path: ci-summary.md
          if-no-files-found: error
          retention-days: 14

      - name: Configure Cloudflare R2 credentials
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_downloads }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.CF_S3_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.CF_S3_SECRET_KEY }}
          aws-region: us-east-1

      - name: Publish downloads to Cloudflare R2
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_downloads }}
        env:
          CF_S3_BUCKET: ${{ secrets.CF_S3_BUCKET }}
          CF_S3_ENDPOINT: ${{ secrets.CF_S3_ENDPOINT }}
          CF_S3_PUBLIC_BASE_URL: ${{ secrets.CF_S3_PUBLIC_BASE_URL }}
        run: |
          aws s3 sync descargas "s3://${CF_S3_BUCKET}/eleccionesdb-etl/descargas/" \
            --endpoint-url "${CF_S3_ENDPOINT}" \
            --delete
          echo "Published: ${CF_S3_PUBLIC_BASE_URL}/eleccionesdb-etl/descargas/" >> "${GITHUB_STEP_SUMMARY}"
