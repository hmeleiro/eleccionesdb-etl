name: Deploy DB

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type TRUNCATE_AND_LOAD_ELECCIONESDB to load PostgreSQL.
        required: true
        type: string
      data_index_url:
        description: Optional local/remote data manifest override for DATA_INDEX_URL.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-db
  cancel-in-progress: false

env:
  RENV_CONFIG_SYNCHRONIZED_CHECK: false
  TARGETS_ERROR: stop

jobs:
  deploy-db:
    name: Load PostgreSQL via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: production-db

    steps:
      - name: Check manual confirmation
        run: |
          test "${{ inputs.confirm }}" = "TRUNCATE_AND_LOAD_ELECCIONESDB"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via SSH
        env:
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_REPO_PATH: ${{ secrets.REMOTE_REPO_PATH }}
          DATA_INDEX_URL: ${{ inputs.data_index_url }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          ssh -o ConnectTimeout=10 \
              -o StrictHostKeyChecking=accept-new \
             "${REMOTE_USER}@${REMOTE_HOST}" bash -s << EOF
          set -e
          
          # Navigate to repo
          cd "${REMOTE_REPO_PATH}"
          
          # Update repo
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}
          
          # Setup environment variables
          export RENV_CONFIG_SYNCHRONIZED_CHECK=false
          export TARGETS_ERROR=stop
          export DATA_INDEX_URL="${DATA_INDEX_URL}"
          
          # Download data-raw if needed
          if [ -z "${DATA_INDEX_URL}" ]; then
            Rscript -e "source('R/00-setup/download_data_raw.R')"
          fi
          
          # Initialize renv and restore all packages
          Rscript -e "renv::consent(provided = TRUE); renv::restore(clean = TRUE, rebuild = FALSE)"
          Rscript R/00-setup/check_data_raw.R
          
          # Write database environment
          {
            echo "DB_NAME=${DB_NAME}"
            echo "DB_HOST=localhost"
            echo "DB_PORT=${DB_PORT}"
            echo "DB_USER=${DB_USER}"
            echo "DB_PASSWORD=${DB_PASSWORD}"
          } > .env
          
          # Load PostgreSQL
          Rscript -e "source('run.R'); run_writedb()"
          EOF
