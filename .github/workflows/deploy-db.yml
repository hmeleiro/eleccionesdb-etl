name: Deploy DB

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type TRUNCATE_AND_LOAD_ELECCIONESDB to load PostgreSQL.
        required: true
        type: string
      data_index_url:
        description: Optional local/remote data manifest override for DATA_INDEX_URL.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-db
  cancel-in-progress: false

env:
  R_VERSION: "4.5.3"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RENV_CONFIG_SYNCHRONIZED_CHECK: false
  TARGETS_ERROR: stop
  DATA_INDEX_URL: ${{ inputs.data_index_url }}

jobs:
  deploy-db:
    name: Load PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: production-db

    steps:
      - name: Check manual confirmation
        run: |
          test "${{ inputs.confirm }}" = "TRUNCATE_AND_LOAD_ELECCIONESDB"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libfribidi-dev \
            libgit2-dev \
            libglpk-dev \
            libharfbuzz-dev \
            libjpeg-dev \
            libpng-dev \
            libpq-dev \
            libssl-dev \
            libtiff-dev \
            libxml2-dev \
            chromium \
            cmake \
            libx11-dev \
            pandoc

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}
          use-public-rspm: true

      - name: Restore renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Restore data-raw cache
        id: cache-data
        if: ${{ env.DATA_INDEX_URL == '' }}
        uses: actions/cache@v4
        with:
          path: data-raw
          key: data-raw-${{ runner.os }}-${{ hashFiles('data-manifest.csv') }}

      - name: Download data-raw
        if: ${{ env.DATA_INDEX_URL != '' || steps.cache-data.outputs.cache-hit != 'true' }}
        run: Rscript -e "source('R/00-setup/download_data_raw.R')"

      - name: Check data-raw
        run: Rscript R/00-setup/check_data_raw.R

      - name: Write database environment
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          {
            echo "DB_NAME=${DB_NAME}"
            echo "DB_HOST=${DB_HOST}"
            echo "DB_PORT=${DB_PORT}"
            echo "DB_USER=${DB_USER}"
            echo "DB_PASSWORD=${DB_PASSWORD}"
          } > .env

      - name: Load PostgreSQL
        run: Rscript -e "source('run.R'); run_writedb()"
